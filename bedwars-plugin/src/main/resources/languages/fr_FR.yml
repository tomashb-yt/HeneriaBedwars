config-version: 1

general:
  prefix: "<gray>[<aqua>HeneriaBedWars<gray>] "
  no-permission: "<red>Vous n'avez pas la permission d'utiliser cette commande."
  player-only: "<red>Cette commande est réservée aux joueurs."
  unknown-command: "<red>Commande inconnue."
  internal-error: "<red>Une erreur interne est survenue."
command:
  help:
    header: "<aqua><bold>HeneriaBedWars"
    version: "<gray>/bedwars version <dark_gray>- <white>Affiche la version du plugin."
    reload: "<gray>/bedwars reload <dark_gray>- <white>Recharge les configurations."
    config: "<gray>/bedwars config <dark_gray>- <white>Affiche la configuration active."
    language: "<gray>/bedwars language [set <locale>] <dark_gray>- <white>Gère la langue globale."
    gui: "<gray>/bedwars gui <dark_gray>- <white>Ouvre le menu de test des interfaces."
    item: "<gray>/bedwars item <dark_gray>- <white>Inspecte les items configurables."
    arena: "<gray>/bedwars arena <dark_gray>- <white>Administre les definitions d'arenes."
    setup: "<gray>/bedwars setup <dark_gray>- <white>Ouvre la configuration en jeu."
  version:
    header: "<aqua><bold>HeneriaBedWars"
    plugin-version: "<gray>Version du plugin : <white>{plugin_version}"
    java-version: "<gray>Version Java : <white>{java_version}"
    server-version: "<gray>Version du serveur : <white>{server_version}"
    state: "<gray>État : <green>{state}"
    services: "<gray>Services enregistrés : <white>{service_count}"
  reload:
    started: "<yellow>Rechargement des configurations..."
    success: "<green>Rechargement terminé avec succès."
    failed: "<red>Le rechargement a échoué. Consultez la console."
    loaded-files: "<gray>Fichiers chargés : <white>{loaded_files}"
    warnings: "<gray>Avertissements : <white>{warnings}"
    errors: "<gray>Erreurs : <white>{errors}"
    preserved: "<yellow>L'ancienne configuration est toujours active."
  config:
    header: "<aqua><bold>Configuration active"
    language: "<gray>Langue : <white>{language}"
    debug: "<gray>Debug : <white>{debug}"
    loaded-files: "<gray>Fichiers chargés : <white>{loaded_files}"
    versions: "<gray>Versions principales : <white>{versions}"
    storage: "<gray>Stockage configuré : <white>{storage}"
    last-reload: "<gray>Dernier rechargement réussi : <white>{last_reload}"
    warnings: "<gray>Avertissements actifs : <white>{warnings}"
    gui-sessions: "<gray>Sessions GUI actives : <white>{gui_sessions}"
    items: "<gray>Items configurables actifs : <white>{items}"
    arenas: "<gray>Arenes chargees : <white>{arena_count}"
  language:
    current: "<gray>Langue actuelle : <white>{language}"
    available: "<gray>Langues disponibles : <white>{locales}"
    usage: "<yellow>Utilisation : /bedwars language set <locale>"
    changed: "<green>La langue globale est maintenant <white>{language}<green>."
    unknown: "<red>Langue inconnue : <white>{language}"
  item:
    help: "<yellow>Utilisation : /bedwars item <list|give <clé>|preview>"
    list: "<gray>Items chargés (<white>{count}<gray>) : <white>{keys}"
    unknown: "<red>Clé d'item inconnue : <white>{item_key}"
    given: "<green>Une copie de <white>{item_key}<green> a été ajoutée à votre inventaire."
    inventory-full: "<red>Votre inventaire est plein. Aucun item n'a été ajouté."
    preview-title: "<aqua>Prévisualisation des items"
  arena:
    help: "<yellow>Utilisation : /bedwars arena <create|list|info|menu|setworld|setwaiting|setspectator|setplayers|setteams|validate|enable|disable|delete>"
    created: "<green>Arene <white>{arena}<green> creee en brouillon."
    exists: "<red>L'arene <white>{arena}<red> existe deja."
    invalid-id: "<red>Identifiant invalide : 2 a 32 caracteres parmi a-z, 0-9, _ et -."
    not-found: "<red>Arene inconnue : <white>{arena}"
    list: "<gray>Arenes (<white>{count}<gray>) : <white>{arenas}"
    info: "<aqua>{arena_name} <gray>(<white>{arena_id}<gray>) - <white>{arena_status}<gray>, monde <white>{world}<gray>, joueurs <white>{min_players}-{max_players}<gray>, equipes <white>{teams}x{players_per_team}"
    updated: "<green>Arene <white>{arena}<green> enregistree."
    enabled: "<green>Arene <white>{arena}<green> activee."
    disabled: "<yellow>Arene <white>{arena}<yellow> desactivee."
    deleted: "<green>Arene <white>{arena}<green> sauvegardee puis supprimee."
    invalid-argument: "<red>Arguments invalides. Consultez /bedwars arena."
    valid: "<green>L'arene <white>{arena}<green> est valide."
    invalid: "<red>L'arene <white>{arena}<red> n'est pas activable."
    problem: "<gray>[{severity}] <white>{field}<gray> - {code}: {problem}"
    storage-error: "<red>L'operation sur <white>{arena}<red> n'a pas pu etre enregistree."
    reload: "<gray>Arenes rechargees : <white>{arena_count}<gray>, preservees : <white>{arena_preserved}<gray>, erreurs : <white>{arena_errors}"
    menu-console: "<yellow>La console ne peut pas ouvrir l'editeur. Utilisez les sous-commandes textuelles /bedwars arena."
admin:
  main:
    title: "<aqua><bold>HeneriaBedWars <gray>- Configuration"
    arenas: "<aqua>Gestion des arenes"
    configuration: "<yellow>Configuration generale"
    lobby: "<gray>Lobby - prochain ticket"
    close: "<red>Fermer"
arena:
  gui:
    list:
      title: "<aqua>Arenes <gray>({count}) - {filter} / {sort}"
      create: "<green>Creer une arene"
      empty: "<gray>Aucune arene pour ce filtre."
      filter: "<yellow>Filtre : {filter}"
      sort: "<yellow>Tri : {sort}"
      refreshed: "<green>Liste actualisee."
    editor:
      title: "<aqua>Edition - {arena_name} <gray>r{arena_revision}"
      autosave: "<green>Modification enregistree automatiquement."
      information: "<aqua>Informations generales"
      display-name: "<yellow>Nom d'affichage"
      world: "<green>Monde"
      waiting: "<yellow>Lobby d'attente"
      spectator: "<aqua>Point spectateur"
      players: "<gold>Parametres joueurs"
      teams: "<light_purple>Parametres equipes"
      boundary: "<blue>Limites de carte"
      validation: "<red>Validation"
      enable: "<green>Activer {arena_name} ?"
      disable: "<yellow>Desactiver {arena_name} ?"
      delete: "<red>Supprimer"
      conflict: "<red>Cette arene a ete modifiee par un autre administrateur. Actualisez le menu."
      failed: "<red>La modification n'a pas pu etre enregistree : {detail}"
      missing: "<red>Cette arene n'existe plus."
    position:
      missing: "<red>Cette position n'est pas configuree."
      clear-title: "<red>Reinitialiser cette position de {arena_id} ?"
  input:
    arena-id: "<yellow>Ecrivez l'identifiant de la nouvelle arene. Tapez annuler pour abandonner."
    display-name: "<yellow>Ecrivez le nouveau nom de {arena_id}. Tapez annuler pour abandonner."
    number: "<yellow>Ecrivez une valeur positive pour {field}. Tapez annuler pour abandonner."
    cancel: "<yellow>Saisie annulee."
    timeout: "<red>La saisie a expire."
    invalid: "<red>Valeur invalide : {problem}. Reessayez ou tapez annuler."
    already-active: "<red>Une saisie est deja active."
  world:
    title: "<green>Monde de {arena_name}"
    selected: "<green>Monde selectionne : {world}"
    current: "<aqua>Monde actuel : {world}"
    not-found: "<red>Le monde {world} n'est pas charge."
    teleport-success: "<green>Teleportation vers {world}."
  players:
    title: "<gold>Joueurs - {arena_name}"
    minimum: "<yellow>Minimum : {minimum_players}"
    maximum: "<yellow>Maximum : {maximum_players}"
    capacity: "<gray>Capacite des equipes : {capacity}"
  teams:
    title: "<light_purple>Equipes - {arena_name}"
    count: "<yellow>Nombre : {team_count}"
    players-per-team: "<yellow>Joueurs/equipe : {players_per_team}"
    format: "<gray>Format : {team_count} x {players_per_team}"
    confirm-title: "<gold>Confirmer {new_team_count} x {new_players_per_team} ?"
  boundary:
    title: "<blue>Limites - {arena_name}"
    enabled: "<green>Limites activees"
    disabled: "<gray>Limites desactivees"
    minimum: "<yellow>Point minimum"
    maximum: "<yellow>Point maximum"
    invalid: "<red>Limites incoherentes"
    reset: "<red>Reinitialiser les limites de {arena_id} ?"
  validation:
    title: "<red>Validation - {arena_name}"
    success: "<green>Aucun probleme bloquant."
    errors: "<red>Erreurs : {validation_errors}"
    warnings: "<yellow>Avertissements : {validation_warnings}"
    open-section: "<gray>Cliquez pour ouvrir la section concernee."
  delete:
    title: "<red>Supprimer {arena_name} ?"
    warning: "<yellow>Une sauvegarde sera creee."
    confirm-enabled: "<red>Cette arene est activee. Confirmez une seconde fois."
    success: "<green>L'arene {arena_id} a ete sauvegardee puis supprimee."
    failed: "<red>Suppression impossible."
gui:
  general:
    back: "<yellow>Retour"
    close: "<red>Fermer"
    previous-page: "<yellow>Page précédente"
    next-page: "<yellow>Page suivante"
    refresh: "<aqua>Actualiser"
    confirm: "<green>Confirmer"
    cancel: "<red>Annuler"
    no-permission: "<red>Vous n'avez pas accès à cette action."
    disabled: "<red>Cette action est actuellement désactivée."
    internal-error: "<red>Une erreur est survenue pendant l'utilisation du menu."
  demo:
    title: "<aqua><bold>HeneriaBedWars <gray>— GUI Test"
    submenu-title: "<light_purple>Sous-menu de démonstration"
    pagination-title: "<green>Pagination de démonstration"
    confirm-title: "<gold>Confirmer l'action de démonstration ?"
    information:
      name: "<aqua>Informations"
      player: "<gray>Joueur : <white>{player}"
      version: "<gray>Version : <white>{plugin_version}"
      language: "<gray>Langue : <white>{language}"
      sessions: "<gray>Sessions GUI : <white>{sessions}"
      refresh-count: "<gray>Rafraîchissements : <white>{refresh_count}"
    click-test:
      name: "<yellow>Test des clics"
      left: "<green>Clic gauche détecté."
      right: "<green>Clic droit détecté."
      shift-left: "<green>Shift + clic gauche détecté."
      shift-right: "<green>Shift + clic droit détecté."
      middle: "<green>Clic du milieu détecté."
    pagination:
      name: "<green>Tester la pagination"
      element: "<aqua>Élément de test {element}"
      page: "<gray>Page <white>{page}<gray>/<white>{max_page}"
    confirmation:
      name: "<gold>Tester la confirmation"
      confirmed: "<green>Action de démonstration confirmée."
      cancelled: "<yellow>Action de démonstration annulée."
    submenu:
      name: "<light_purple>Ouvrir un sous-menu"
      info: "<gray>Ce sous-menu démontre la navigation."
    refresh:
      name: "<aqua>Actualiser le menu"
    controlled-error:
      name: "<red>Erreur contrôlée"
      lore: "<gray>Test debug : l'exception sera interceptée."
    close:
      name: "<red>Fermer"

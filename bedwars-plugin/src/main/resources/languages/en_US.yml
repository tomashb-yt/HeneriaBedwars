config-version: 1

general:
  prefix: "<gray>[<aqua>HeneriaBedWars<gray>] "
  no-permission: "<red>You do not have permission to use this command."
  player-only: "<red>This command is only available to players."
  unknown-command: "<red>Unknown command."
  internal-error: "<red>An internal error occurred."
command:
  help:
    header: "<aqua><bold>HeneriaBedWars"
    version: "<gray>/bedwars version <dark_gray>- <white>Displays the plugin version."
    reload: "<gray>/bedwars reload <dark_gray>- <white>Reloads configuration files."
    config: "<gray>/bedwars config <dark_gray>- <white>Displays the active configuration."
    language: "<gray>/bedwars language [set <locale>] <dark_gray>- <white>Manages the global language."
    gui: "<gray>/bedwars gui <dark_gray>- <white>Opens the GUI test menu."
    item: "<gray>/bedwars item <dark_gray>- <white>Inspects configurable items."
  version:
    header: "<aqua><bold>HeneriaBedWars"
    plugin-version: "<gray>Plugin version: <white>{plugin_version}"
    java-version: "<gray>Java version: <white>{java_version}"
    server-version: "<gray>Server version: <white>{server_version}"
    state: "<gray>State: <green>{state}"
    services: "<gray>Registered services: <white>{service_count}"
  reload:
    started: "<yellow>Reloading configuration files..."
    success: "<green>Reload completed successfully."
    failed: "<red>Reload failed. Check the console."
    loaded-files: "<gray>Loaded files: <white>{loaded_files}"
    warnings: "<gray>Warnings: <white>{warnings}"
    errors: "<gray>Errors: <white>{errors}"
    preserved: "<yellow>The previous configuration is still active."
  config:
    header: "<aqua><bold>Active configuration"
    language: "<gray>Language: <white>{language}"
    debug: "<gray>Debug: <white>{debug}"
    loaded-files: "<gray>Loaded files: <white>{loaded_files}"
    versions: "<gray>Main versions: <white>{versions}"
    storage: "<gray>Configured storage: <white>{storage}"
    last-reload: "<gray>Last successful reload: <white>{last_reload}"
    warnings: "<gray>Active warnings: <white>{warnings}"
    gui-sessions: "<gray>Active GUI sessions: <white>{gui_sessions}"
    items: "<gray>Active configurable items: <white>{items}"
  language:
    current: "<gray>Current language: <white>{language}"
    available: "<gray>Available languages: <white>{locales}"
    usage: "<yellow>Usage: /bedwars language set <locale>"
    changed: "<green>The global language is now <white>{language}<green>."
    unknown: "<red>Unknown language: <white>{language}"
  item:
    help: "<yellow>Usage: /bedwars item <list|give <key>|preview>"
    list: "<gray>Loaded items (<white>{count}<gray>): <white>{keys}"
    unknown: "<red>Unknown item key: <white>{item_key}"
    given: "<green>A copy of <white>{item_key}<green> was added to your inventory."
    inventory-full: "<red>Your inventory is full. No item was added."
    preview-title: "<aqua>Item preview"
gui:
  general:
    back: "<yellow>Back"
    close: "<red>Close"
    previous-page: "<yellow>Previous page"
    next-page: "<yellow>Next page"
    refresh: "<aqua>Refresh"
    confirm: "<green>Confirm"
    cancel: "<red>Cancel"
    no-permission: "<red>You cannot use this action."
    disabled: "<red>This action is currently disabled."
    internal-error: "<red>An error occurred while using the menu."
  demo:
    title: "<aqua><bold>HeneriaBedWars <gray>— GUI Test"
    submenu-title: "<light_purple>Demonstration submenu"
    pagination-title: "<green>Demonstration pagination"
    confirm-title: "<gold>Confirm the demonstration action?"
    information:
      name: "<aqua>Information"
      player: "<gray>Player: <white>{player}"
      version: "<gray>Version: <white>{plugin_version}"
      language: "<gray>Language: <white>{language}"
      sessions: "<gray>GUI sessions: <white>{sessions}"
      refresh-count: "<gray>Refreshes: <white>{refresh_count}"
    click-test:
      name: "<yellow>Click test"
      left: "<green>Left click detected."
      right: "<green>Right click detected."
      shift-left: "<green>Shift + left click detected."
      shift-right: "<green>Shift + right click detected."
      middle: "<green>Middle click detected."
    pagination:
      name: "<green>Test pagination"
      element: "<aqua>Test element {element}"
      page: "<gray>Page <white>{page}<gray>/<white>{max_page}"
    confirmation:
      name: "<gold>Test confirmation"
      confirmed: "<green>Demonstration action confirmed."
      cancelled: "<yellow>Demonstration action cancelled."
    submenu:
      name: "<light_purple>Open a submenu"
      info: "<gray>This submenu demonstrates navigation."
    refresh:
      name: "<aqua>Refresh the menu"
    controlled-error:
      name: "<red>Controlled error"
      lore: "<gray>Debug test: the exception will be intercepted."
    close:
      name: "<red>Close"

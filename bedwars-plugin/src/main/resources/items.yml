config-version: 1

fallback-item:
  material: BARRIER
  amount: 1
  name: "<red><bold>Item invalide"
  lore:
    - "<gray>Impossible d'afficher cet item."
    - "<dark_gray>Référence : {item_key}"
  glow: false
  unbreakable: false
  custom-model-data: null
  item-flags: []
  enchantments: {}

items:
  gui:
    border:
      material: GRAY_STAINED_GLASS_PANE
      amount: 1
      name: " "
      lore: []
      glow: false
      tags:
        category: gui
    back:
      material: ARROW
      name-key: "gui.general.back"
      lore: []
      item-flags: [HIDE_ATTRIBUTES]
      tags:
        category: gui
        action: back
    close:
      material: BARRIER
      name-key: "gui.general.close"
      lore: []
      tags:
        category: gui
        action: close
    confirm:
      material: LIME_CONCRETE
      name-key: "gui.general.confirm"
      tags:
        category: gui
        action: confirm
    cancel:
      material: RED_CONCRETE
      name-key: "gui.general.cancel"
      tags:
        category: gui
        action: cancel
    previous-page:
      material: ARROW
      name-key: "gui.general.previous-page"
      lore-keys: ["gui.demo.pagination.page"]
      tags:
        category: gui
        action: previous-page
    next-page:
      material: ARROW
      name-key: "gui.general.next-page"
      lore-keys: ["gui.demo.pagination.page"]
      tags:
        category: gui
        action: next-page
    page-indicator:
      material: MAP
      name-key: "gui.demo.pagination.page"
      tags:
        category: gui
    refresh:
      material: SUNFLOWER
      name-key: "gui.general.refresh"
      tags:
        category: gui
        action: refresh
    information:
      material: BOOK
      name: "<aqua>Information"
      tags:
        category: gui
    locked:
      material: IRON_BARS
      name: "<red>Accès verrouillé"
      tags:
        category: gui
    error:
      inherit: "gui.close"
      name: "<red>Erreur"

  demo:
    information:
      material: PLAYER_HEAD
      name-key: "gui.demo.information.name"
      lore-keys:
        - "gui.demo.information.player"
        - "gui.demo.information.version"
        - "gui.demo.information.language"
        - "gui.demo.information.sessions"
        - "gui.demo.information.refresh-count"
      head:
        type: context-player
      required-placeholders: [player, plugin_version, language, sessions, refresh_count]
      tags:
        category: demo
    click-test:
      material: STONE_BUTTON
      name-key: "gui.demo.click-test.name"
      tags:
        category: demo
    pagination:
      material: CHEST
      name-key: "gui.demo.pagination.name"
      tags:
        category: demo
    pagination-entry:
      material: PAPER
      name-key: "gui.demo.pagination.element"
      required-placeholders: [element]
      tags:
        category: demo
    confirmation:
      material: EMERALD
      name-key: "gui.demo.confirmation.name"
      tags:
        category: demo
    submenu:
      material: ENDER_CHEST
      name-key: "gui.demo.submenu.name"
      tags:
        category: demo
    submenu-information:
      inherit: "gui.information"
      name-key: "gui.demo.submenu.info"
    refresh:
      inherit: "gui.refresh"
      name-key: "gui.demo.refresh.name"
    controlled-error:
      material: TNT
      name-key: "gui.demo.controlled-error.name"
      lore-keys: ["gui.demo.controlled-error.lore"]
      tags:
        category: demo
    close:
      inherit: "gui.close"
  admin:
    main:
      overview:
        material: NETHER_STAR
        name: "<aqua><bold>HeneriaBedWars"
        lore: ["<dark_gray>Centre de configuration", "", "<gray>Arènes: <white>{arena_count}", "<gray>Cartes: <white>{map_count}", "<green>Prêtes: {enabled_count}", "<red>À terminer: {invalid_count}"]
      arenas:
        material: RED_BED
        name: "<aqua><bold>Mes arènes"
        lore: ["<gray>Créer et configurer les parties", "", "<white>{arena_count} <gray>arène(s)", "<green>{enabled_count} <gray>prête(s)", "<red>{invalid_count} <gray>à terminer", "", "<yellow>▸ Cliquez pour ouvrir"]
      arenas-v2:
        material: RED_BED
        name: "<aqua><bold>Mes arènes"
        lore: ["<gray>Créer et configurer les parties", "", "<white>{arena_count} <gray>arène(s)", "<green>{enabled_count} <gray>prête(s)", "<red>{invalid_count} <gray>à terminer", "", "<yellow>▸ Cliquez pour ouvrir"]
      games-v5:
        material: CLOCK
        name: "<gold><bold>Parties en cours"
        lore: ["<gray>Surveiller les lobbys temporaires", "", "<white>{game_count} <gray>instance(s)", "<yellow>{waiting_count} <gray>en attente", "<aqua>{starting_count} <gray>en lancement", "<green>{playing_count} <gray>en jeu", "", "<yellow>Cliquez pour ouvrir"]
      maps:
        material: GRASS_BLOCK
        name: "<green><bold>Mes cartes"
        lore: ["<gray>Construire les mondes BedWars", "", "<white>{map_count} <gray>carte(s)", "<aqua>{loaded_map_count} <gray>chargée(s)", "", "<yellow>▸ Cliquez pour ouvrir"]
      create-arena:
        material: LIME_CONCRETE
        name: "<green>Créer une arène"
        lore: ["<gray>L'assistant vous guide étape par étape.", "", "<yellow>▸ Cliquez pour commencer"]
      create-map:
        material: EMERALD_BLOCK
        name: "<green>Créer une carte BedWars"
        lore: ["<gray>Crée automatiquement un monde vide.", "", "<yellow>▸ Cliquez pour commencer"]
      guide:
        material: BOOK
        name: "<gold><bold>Parcours conseillé"
        lore: ["<yellow>1. <white>Créez une carte", "<yellow>2. <white>Construisez votre map", "<yellow>3. <white>Créez une arène", "<yellow>4. <white>Placez attente et spectateurs", "<yellow>5. <white>Activez l'arène"]
      configuration:
        material: COMPARATOR
        name: "<yellow>État du plugin"
        lore: ["<gray>Langue: <white>{language}", "<gray>Configuration: <green>chargée", "<gray>Fichiers: <white>{loaded_files}", "", "<yellow>▸ Voir les détails"]
      configuration-v2:
        material: COMPARATOR
        name: "<yellow>État du plugin"
        lore: ["<gray>Langue: <white>{language}", "<gray>Configuration: <green>chargée", "<gray>Fichiers: <white>{loaded_files}", "", "<yellow>▸ Voir les détails"]
      back-to-dashboard-v3:
        material: ARROW
        name: "<aqua>Retour à la configuration"
        lore: ["<gray>Revenir au tableau de bord principal.", "", "<yellow>▸ Cliquez pour revenir"]
    configuration:
      summary-v3:
        material: NETHER_STAR
        name: "<green><bold>Plugin opérationnel"
        lore: ["<gray>Les services de configuration sont chargés.", "", "<gray>Arènes: <white>{arena_count}", "<gray>Cartes: <white>{map_count}", "<green>Arènes actives: <white>{enabled_count}"]
      language-v3:
        material: BOOK
        name: "<aqua>Langue et affichage"
        lore: ["<gray>Langue active: <white>{language}", "<gray>Mode diagnostic: <white>{debug}", "", "<dark_gray>Les menus utilisent automatiquement", "<dark_gray>la configuration actuellement chargée."]
      resources-v3:
        material: CHEST
        name: "<gold>Ressources chargées"
        lore: ["<gray>Fichiers et langues: <white>{loaded_files}", "<gray>Apparences d'items: <white>{items}", "<gray>Cartes actuellement ouvertes: <white>{loaded_map_count}", "", "<green>Aucune action requise."]
      storage-v3:
        material: BARREL
        name: "<yellow>Stockage préparé"
        lore: ["<gray>Type configuré: <white>{storage}", "", "<gray>Les arènes et cartes actuelles sont", "<gray>sauvegardées automatiquement en YAML.", "<dark_gray>Les statistiques arriveront plus tard."]
  arena:
    list:
      create: {material: EMERALD, name: "<green>Creer une arene", lore: ["<gray>Saisie securisee dans le chat."]}
      filter: {material: HOPPER, name: "<yellow>Filtre: {filter}", lore: ["<gray>Cliquez pour changer."]}
      sort: {material: COMPARATOR, name: "<yellow>Tri: {sort}", lore: ["<gray>Cliquez pour changer."]}
      create-v2: {material: EMERALD_BLOCK, name: "<green><bold>Créer une arène", lore: ["<gray>L'assistant vous guidera ensuite.", "", "<yellow>▸ Cliquez puis écrivez son nom"]}
      filter-v2: {material: HOPPER, name: "<yellow>Afficher : <white>{filter}", lore: ["", "<yellow>▸ Cliquez pour changer"]}
      sort-v2: {material: COMPARATOR, name: "<yellow>Trier par : <white>{sort}", lore: ["", "<yellow>▸ Cliquez pour changer"]}
      guide-v3: {material: COMPASS, name: "<aqua><bold>Choisissez une arène", lore: ["<gray>Affichées: <white>{visible_count}<gray> / {arena_count}", "<gray>Filtre: <white>{filter}", "<gray>Tri: <white>{sort}", "", "<yellow>▸ Gauche : continuer la configuration", "<aqua>▸ Droit : voir les étapes", "<red>▸ Shift+droit : supprimer"]}
      empty-v3: {material: MINECART, name: "<gold><bold>Aucune arène affichée", lore: ["<gray>Filtre actuel: <white>{filter}", "", "<gray>Changez le filtre ou créez", "<gray>une nouvelle arène ci-dessous."]}
      entry-enabled: &arena-entry
        material: LIME_CONCRETE
        name: "<green>{arena_name}"
        lore: ["<gray>ID: <white>{arena_id}", "<gray>Statut: <white>{arena_status}", "<gray>Monde: <white>{world}", "<gray>Format: <white>{team_count} x {players_per_team}", "<gray>Joueurs: <white>{minimum_players}-{maximum_players}", "<red>Erreurs: {validation_errors}", "<yellow>Avertissements: {validation_warnings}", "", "<white>Clic gauche: editer", "<white>Clic droit: validation", "<red>Shift+droit: supprimer"]
      entry-disabled:
        <<: *arena-entry
        material: GRAY_CONCRETE
        name: "<gray>{arena_name}"
      entry-invalid:
        <<: *arena-entry
        material: RED_CONCRETE
        name: "<red>{arena_name}"
      entry-draft:
        <<: *arena-entry
        material: ORANGE_CONCRETE
        name: "<gold>{arena_name}"
      entry-enabled-v2: &arena-entry-v2
        material: LIME_CONCRETE
        name: "<green><bold>{arena_name}"
        lore: ["<gray>État: <white>{arena_status_label}", "<gray>Carte: <white>{map_template}", "<gray>Format: <white>{team_count} équipes de {players_per_team}", "", "<gold>{validation_errors} étape(s) restante(s)", "", "<yellow>▸ Gauche : configurer", "<aqua>▸ Droit : voir les étapes", "<red>▸ Shift+droit : supprimer"]
      entry-disabled-v2:
        <<: *arena-entry-v2
        material: GRAY_CONCRETE
        name: "<gray><bold>{arena_name}"
      entry-invalid-v2:
        <<: *arena-entry-v2
        material: ORANGE_CONCRETE
        name: "<gold><bold>{arena_name}"
      entry-draft-v2:
        <<: *arena-entry-v2
        material: YELLOW_CONCRETE
        name: "<yellow><bold>{arena_name}"
    editor:
      information:
        material: BOOK
        name: "<aqua>Informations generales"
        lore: ["<gray>ID: <white>{arena_id}", "<gray>Nom: <white>{arena_name}", "<gray>Statut: <white>{arena_status}", "<gray>Revision: <white>{arena_revision}", "<gray>Fichier: <white>{arena_file}", "<gray>Creee: <white>{created_at}", "<gray>Modifiee: <white>{updated_at}", "<red>Erreurs: {validation_errors}", "<yellow>Avertissements: {validation_warnings}"]
      display-name: {material: NAME_TAG, name: "<yellow>Nom d'affichage", lore: ["<white>{arena_name}", "<gray>Cliquez pour modifier dans le chat."]}
      world: {material: GRASS_BLOCK, name: "<green>Carte du jeu", lore: ["<gray>Carte liée: <white>{map_template}", "<gray>Monde: <white>{world}", "", "<yellow>▸ Cliquez pour choisir"]}
      map-template: {material: GRASS_BLOCK, name: "<green><bold>Carte du jeu", lore: ["<gray>Carte liée: <white>{map_template}", "<gray>Monde: <white>{world}", "", "<yellow>▸ Cliquez pour choisir ou créer"]}
      waiting-lobby: {material: CLOCK, name: "<yellow>Lobby d'attente", lore: ["<gray>Configure: <white>{position_configured}", "<gray>Monde: <white>{position_world}", "<gray>{x}, {y}, {z}", "<white>Gauche: definir ici", "<white>Droit: teleporter", "<red>Shift+droit: reinitialiser"]}
      spectator: {material: ENDER_EYE, name: "<aqua>Point spectateur", lore: ["<gray>Configure: <white>{position_configured}", "<gray>Monde: <white>{position_world}", "<gray>{x}, {y}, {z}", "<white>Gauche: definir ici", "<white>Droit: teleporter", "<red>Shift+droit: reinitialiser"]}
      players: {material: PLAYER_HEAD, name: "<gold>Joueurs", lore: ["<gray>Minimum: <white>{minimum_players}", "<gray>Maximum: <white>{maximum_players}", "<gray>Capacite equipes: <white>{capacity}"]}
      teams: {material: WHITE_BANNER, name: "<light_purple>Equipes", lore: ["<gray>Format: <white>{team_count} x {players_per_team}", "<gray>Capacite: <white>{capacity}"]}
      boundary: {material: STRUCTURE_VOID, name: "<blue>Limites de carte", lore: ["<gray>Configuration administrative uniquement."]}
      validation-valid: {material: LIME_CONCRETE, name: "<green><bold>Configuration terminée", lore: ["<gray>L'arène peut être activée.", "", "<yellow>▸ Voir le résumé"]}
      validation-invalid: {material: ORANGE_CONCRETE, name: "<gold><bold>Configuration à terminer", lore: ["<white>{validation_errors} <gray>étape(s) obligatoire(s)", "<white>{validation_warnings} <gray>conseil(s)", "", "<yellow>▸ Cliquez pour être guidé"]}
      setup-valid: {material: LIME_CONCRETE, name: "<green><bold>Configuration terminée", lore: ["<gray>L'arène peut être activée.", "", "<yellow>▸ Voir le résumé"]}
      setup-incomplete: {material: ORANGE_CONCRETE, name: "<gold><bold>Configuration à terminer", lore: ["<white>{validation_errors} <gray>étape(s) obligatoire(s)", "<white>{validation_warnings} <gray>conseil(s)", "", "<yellow>▸ Cliquez pour être guidé"]}
      enable: {material: LIME_DYE, name: "<green>Activer l'arene"}
      enable-invalid: {material: BARRIER, name: "<red>Activation impossible", lore: ["<gray>Cliquez pour afficher les problemes."]}
      disable: {material: GRAY_DYE, name: "<yellow>Desactiver l'arene"}
      delete: {material: TNT, name: "<red>Supprimer l'arene", lore: ["<yellow>Une sauvegarde sera creee."]}
      assistant-progress:
        material: NETHER_STAR
        name: "<aqua><bold>Assistant de configuration"
        lore: ["<gray>Progression: <white>{setup_percent}%", "<gray>Étapes: <white>{setup_steps_complete}/{setup_steps_total}", "", "<yellow>Prochaine action :", "<white>{next_step}", "", "<dark_gray>Les changements sont sauvegardés automatiquement."]
      assistant-name: {material: NAME_TAG, name: "<yellow>Présentation de l'arène", lore: ["<gray>Nom actuel: <white>{arena_name}", "", "<yellow>▸ Cliquez pour le modifier"]}
      assistant-map: {material: GRASS_BLOCK, name: "<aqua><bold>1. Carte BedWars", lore: ["<gray>État: <white>{map_step}", "<gray>Carte: <white>{map_template}", "", "<yellow>▸ Cliquez pour choisir ou créer"]}
      assistant-waiting: {material: CLOCK, name: "<gold><bold>2. Point d'attente", lore: ["<gray>État: <white>{position_status}", "<gray>Les joueurs attendront ici avant", "<gray>le lancement de la partie.", "", "<yellow>▸ Gauche : placer ici", "<aqua>▸ Droit : s'y téléporter", "<red>▸ Shift+droit : retirer"]}
      assistant-teams: {material: WHITE_BANNER, name: "<light_purple><bold>3. Format des équipes", lore: ["<gray>État: <white>{teams_step}", "<gray>Format: <white>{team_count} équipe(s) de {players_per_team}", "<gray>Capacité totale: <white>{capacity}", "", "<yellow>▸ Cliquez pour configurer"]}
      assistant-players: {material: PLAYER_HEAD, name: "<gold><bold>4. Nombre de joueurs", lore: ["<gray>État: <white>{players_step}", "<gray>Minimum: <white>{minimum_players}", "<gray>Maximum: <white>{maximum_players}", "", "<yellow>▸ Cliquez pour configurer"]}
      assistant-spectator: {material: ENDER_EYE, name: "<aqua><bold>5. Point spectateur <gray>(conseillé)", lore: ["<gray>État: <white>{position_status}", "<gray>Les joueurs éliminés seront placés ici.", "", "<yellow>▸ Gauche : placer ici", "<aqua>▸ Droit : s'y téléporter", "<red>▸ Shift+droit : retirer"]}
      assistant-boundary: {material: STRUCTURE_VOID, name: "<blue>Option : limites de construction", lore: ["<gray>Empêche de construire hors de la zone.", "<gray>Inutile pour commencer.", "", "<yellow>▸ Cliquez pour configurer"]}
      assistant-review: {material: ORANGE_CONCRETE, name: "<gold><bold>Vérifier les étapes", lore: ["<white>{validation_errors} <gray>étape(s) obligatoire(s)", "<white>{validation_warnings} <gray>conseil(s)", "", "<yellow>Prochaine action :", "<white>{next_step}", "", "<yellow>▸ Cliquez pour être guidé"]}
      assistant-review-ready: {material: LIME_CONCRETE, name: "<green><bold>Configuration terminée", lore: ["<gray>Toutes les étapes obligatoires", "<gray>sont correctement configurées.", "", "<yellow>▸ Cliquez pour vérifier"]}
      assistant-activation-ready: {material: LIME_CONCRETE, name: "<green><bold>Activer l'arène", lore: ["<gray>L'arène est prête à être utilisée.", "", "<yellow>▸ Cliquez pour confirmer"]}
      assistant-activation-blocked: {material: IRON_BARS, name: "<gray><bold>Activation verrouillée", lore: ["<gold>{validation_errors} étape(s) sont encore requises.", "", "<yellow>▸ Cliquez pour voir quoi faire"]}
      assistant-runtime-ready: {material: ENDER_EYE, glow: true, name: "<aqua><bold>Tester l'arène", lore: ["<gray>L'arène est active et prête.", "<gray>Une instance sera créée automatiquement", "<gray>si aucune n'existe encore.", "", "<green>▸ Gauche : lancer ou rejoindre", "<yellow>▸ Droit : désactiver"]}
      assistant-disable: {material: GRAY_DYE, name: "<yellow>Désactiver l'arène", lore: ["<gray>La configuration sera conservée.", "", "<yellow>▸ Cliquez pour confirmer"]}
      assistant-delete: {material: TNT, name: "<red>Supprimer définitivement", lore: ["<gray>Une sauvegarde sera créée avant", "<gray>la suppression de l'arène.", "", "<red>▸ Cliquez pour continuer"]}
    world:
      entry: {material: GRASS_BLOCK, name: "<green>{world}", lore: ["<gray>Environnement: <white>{environment}", "<gray>Joueurs: <white>{world_players}", "<gray>Monde actuel: <white>{world_current}", "<gray>Selectionne: <white>{world_selected}", "<white>Gauche: selectionner", "<white>Droit: teleporter"]}
    players:
      minimum: &number-item {material: REDSTONE, name: "<yellow>Minimum: {minimum_players}", lore: ["<white>Gauche: +1", "<white>Droit: -1", "<white>Shift+gauche: +5", "<white>Shift+droit: -5", "<white>Milieu: saisir"]}
      maximum: {<<: *number-item, material: GLOWSTONE_DUST, name: "<yellow>Maximum: {maximum_players}"}
      assistant-summary: {material: PLAYER_HEAD, name: "<gold><bold>Réglage des joueurs", lore: ["<gray>Choisissez combien de joueurs sont", "<gray>nécessaires pour lancer la partie.", "", "<gray>Capacité des équipes: <white>{capacity}", "<gray>Plage actuelle: <white>{minimum_players} à {maximum_players}"]}
      minimum-assisted: {material: REDSTONE, name: "<yellow>Minimum : <white>{minimum_players}", lore: ["<gray>Nombre requis pour démarrer.", "", "<green>▸ Gauche : +1", "<red>▸ Droit : -1", "<green>▸ Shift+gauche : +5", "<red>▸ Shift+droit : -5", "<aqua>▸ Molette : écrire une valeur"]}
      maximum-assisted: {material: GLOWSTONE_DUST, name: "<yellow>Maximum : <white>{maximum_players}", lore: ["<gray>Ne doit pas dépasser la capacité", "<gray>définie par les équipes: <white>{capacity}", "", "<green>▸ Gauche : +1", "<red>▸ Droit : -1", "<green>▸ Shift+gauche : +5", "<red>▸ Shift+droit : -5", "<aqua>▸ Molette : écrire une valeur"]}
    teams:
      count: {<<: *number-item, material: WHITE_BANNER, name: "<yellow>Equipes: {team_count}"}
      players-per-team: {<<: *number-item, material: PLAYER_HEAD, name: "<yellow>Joueurs/equipe: {players_per_team}"}
      confirm: {material: PAPER, name: "<gold>Nouveau format", lore: ["<gray>Avant: <white>{team_count} x {players_per_team}", "<gray>Apres: <white>{new_team_count} x {new_players_per_team}", "<gray>Maximum: <white>{new_capacity}"]}
      assistant-summary: {material: RED_BED, name: "<light_purple><bold>Format de la partie", lore: ["<gray>Exemple: 4 équipes de 4 joueurs", "<gray>donne une capacité totale de 16.", "", "<gray>Format actuel: <white>{team_count} × {players_per_team}", "<gray>Capacité: <white>{capacity}"]}
      count-assisted: {material: WHITE_BANNER, name: "<light_purple>Nombre d'équipes : <white>{team_count}", lore: ["<gray>Minimum recommandé: 2 équipes.", "", "<green>▸ Gauche : +1", "<red>▸ Droit : -1", "<green>▸ Shift+gauche : +2", "<red>▸ Shift+droit : -2", "<aqua>▸ Molette : écrire une valeur"]}
      size-assisted: {material: PLAYER_HEAD, name: "<light_purple>Joueurs par équipe : <white>{players_per_team}", lore: ["<gray>Capacité calculée: <white>{capacity}", "", "<green>▸ Gauche : +1", "<red>▸ Droit : -1", "<green>▸ Shift+gauche : +2", "<red>▸ Shift+droit : -2", "<aqua>▸ Molette : écrire une valeur"]}
      confirm-assisted: {material: PAPER, name: "<gold><bold>Confirmer le nouveau format", lore: ["<gray>Avant: <white>{team_count} × {players_per_team}", "<gray>Après: <white>{new_team_count} × {new_players_per_team}", "<gray>Nouvelle capacité: <white>{new_capacity}"]}
    boundary:
      minimum: {material: BLUE_CONCRETE, name: "<blue>Definir le minimum", lore: ["<gray>Configure: <white>{minimum_configured}"]}
      maximum: {material: RED_CONCRETE, name: "<red>Definir le maximum", lore: ["<gray>Configure: <white>{maximum_configured}"]}
      enabled: {material: LIME_DYE, name: "<green>Limites activees", lore: ["<gray>Cliquez pour desactiver."]}
      disabled: {material: GRAY_DYE, name: "<gray>Limites desactivees", lore: ["<gray>Cliquez pour activer."]}
      reset: {material: BARRIER, name: "<red>Reinitialiser les limites"}
      assistant-minimum: {material: BLUE_CONCRETE, name: "<blue><bold>Point minimum", lore: ["<gray>État: <white>{minimum_configured}", "<gray>Placez-vous dans un premier coin.", "", "<yellow>▸ Gauche : placer ici", "<aqua>▸ Droit : s'y téléporter"]}
      assistant-maximum: {material: RED_CONCRETE, name: "<red><bold>Point maximum", lore: ["<gray>État: <white>{maximum_configured}", "<gray>Placez-vous dans le coin opposé.", "", "<yellow>▸ Gauche : placer ici", "<aqua>▸ Droit : s'y téléporter"]}
      assistant-enabled: {material: LIME_CONCRETE, name: "<green><bold>Limites activées", lore: ["<gray>État: <white>{boundary_status}", "", "<yellow>▸ Cliquez pour désactiver"]}
      assistant-disabled: {material: GRAY_CONCRETE, name: "<gray><bold>Limites désactivées", lore: ["<gray>Cette option n'est pas obligatoire.", "", "<yellow>▸ Cliquez pour activer"]}
      assistant-reset: {material: BARRIER, name: "<red>Réinitialiser les limites", lore: ["<gray>Retire les deux points configurés.", "", "<red>▸ Cliquez pour confirmer"]}

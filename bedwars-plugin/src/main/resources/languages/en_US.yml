config-version: 1

general:
  prefix: "<gray>[<aqua>HeneriaBedWars<gray>] "
  no-permission: "<red>You do not have permission to use this command."
  player-only: "<red>This command is only available to players."
  unknown-command: "<red>Unknown command."
  internal-error: "<red>An internal error occurred."
command:
  help:
    header: "<aqua><bold>HeneriaBedWars"
    version: "<gray>/bedwars version <dark_gray>- <white>Displays the plugin version."
    reload: "<gray>/bedwars reload <dark_gray>- <white>Reloads configuration files."
    config: "<gray>/bedwars config <dark_gray>- <white>Displays the active configuration."
    language: "<gray>/bedwars language [set <locale>] <dark_gray>- <white>Manages the global language."
    gui: "<gray>/bedwars gui <dark_gray>- <white>Opens the GUI test menu."
    item: "<gray>/bedwars item <dark_gray>- <white>Inspects configurable items."
    arena: "<gray>/bedwars arena <dark_gray>- <white>Manages arena definitions."
    setup: "<gray>/bedwars setup <dark_gray>- <white>Opens in-game configuration."
    map: "<gray>/bedwars map <dark_gray>- <white>Manages map templates."
  version:
    header: "<aqua><bold>HeneriaBedWars"
    plugin-version: "<gray>Plugin version: <white>{plugin_version}"
    java-version: "<gray>Java version: <white>{java_version}"
    server-version: "<gray>Server version: <white>{server_version}"
    state: "<gray>State: <green>{state}"
    services: "<gray>Registered services: <white>{service_count}"
  reload:
    started: "<yellow>Reloading configuration files..."
    success: "<green>Reload completed successfully."
    failed: "<red>Reload failed. Check the console."
    loaded-files: "<gray>Loaded files: <white>{loaded_files}"
    warnings: "<gray>Warnings: <white>{warnings}"
    errors: "<gray>Errors: <white>{errors}"
    preserved: "<yellow>The previous configuration is still active."
  config:
    header: "<aqua><bold>Active configuration"
    language: "<gray>Language: <white>{language}"
    debug: "<gray>Debug: <white>{debug}"
    loaded-files: "<gray>Loaded files: <white>{loaded_files}"
    versions: "<gray>Main versions: <white>{versions}"
    storage: "<gray>Configured storage: <white>{storage}"
    last-reload: "<gray>Last successful reload: <white>{last_reload}"
    warnings: "<gray>Active warnings: <white>{warnings}"
    gui-sessions: "<gray>Active GUI sessions: <white>{gui_sessions}"
    items: "<gray>Active configurable items: <white>{items}"
    arenas: "<gray>Loaded arenas: <white>{arena_count}"
  language:
    current: "<gray>Current language: <white>{language}"
    available: "<gray>Available languages: <white>{locales}"
    usage: "<yellow>Usage: /bedwars language set <locale>"
    changed: "<green>The global language is now <white>{language}<green>."
    unknown: "<red>Unknown language: <white>{language}"
  item:
    help: "<yellow>Usage: /bedwars item <list|give <key>|preview>"
    list: "<gray>Loaded items (<white>{count}<gray>): <white>{keys}"
    unknown: "<red>Unknown item key: <white>{item_key}"
    given: "<green>A copy of <white>{item_key}<green> was added to your inventory."
    inventory-full: "<red>Your inventory is full. No item was added."
    preview-title: "<aqua>Item preview"
  arena:
    help: "<yellow>Usage: /bedwars arena <create|list|info|menu|setworld|setwaiting|setspectator|setplayers|setteams|validate|enable|disable|delete>"
    created: "<green>Arena <white>{arena}<green> created as a draft."
    exists: "<red>Arena <white>{arena}<red> already exists."
    invalid-id: "<red>Invalid id: use 2 to 32 characters among a-z, 0-9, _ and -."
    not-found: "<red>Unknown arena: <white>{arena}"
    list: "<gray>Arenas (<white>{count}<gray>): <white>{arenas}"
    info: "<aqua>{arena_name} <gray>(<white>{arena_id}<gray>) - <white>{arena_status}<gray>, world <white>{world}<gray>, players <white>{min_players}-{max_players}<gray>, teams <white>{teams}x{players_per_team}"
    updated: "<green>Arena <white>{arena}<green> saved."
    enabled: "<green>Arena <white>{arena}<green> enabled."
    disabled: "<yellow>Arena <white>{arena}<yellow> disabled."
    deleted: "<green>Arena <white>{arena}<green> backed up and deleted."
    invalid-argument: "<red>Invalid arguments. See /bedwars arena."
    valid: "<green>Arena <white>{arena}<green> is valid."
    invalid: "<red>Arena <white>{arena}<red> cannot be enabled."
    problem: "<gray>[{severity}] <white>{field}<gray> - {code}: {problem}"
    storage-error: "<red>The operation on <white>{arena}<red> could not be saved."
    reload: "<gray>Reloaded arenas: <white>{arena_count}<gray>, preserved: <white>{arena_preserved}<gray>, errors: <white>{arena_errors}"
    menu-console: "<yellow>The console cannot open the editor. Use the textual /bedwars arena subcommands."
admin:
  main:
    title: "<dark_aqua><bold>HeneriaBedWars <gray>• <white>Setup"
    title-v2: "<dark_aqua><bold>HeneriaBedWars <gray>• <white>Setup"
    arenas: "<aqua>Arena management"
    configuration: "<yellow>General configuration"
    configuration-title-v3: "<yellow><bold>Plugin status <gray>• <white>Summary"
    lobby: "<gray>Lobby - future ticket"
    close: "<red>Close"
arena:
  gui:
    list:
      title: "<aqua>Arenas <gray>({count}) - {filter} / {sort}"
      title-v2: "<dark_aqua><bold>My arenas <gray>• <white>{filter}"
      create: "<green>Create an arena"
      empty: "<gray>No arena matches this filter."
      filter: "<yellow>Filter: {filter}"
      sort: "<yellow>Sort: {sort}"
      refreshed: "<green>List refreshed."
    editor:
      title: "<aqua>Editing - {arena_name} <gray>r{arena_revision}"
      assistant-title: "<dark_aqua><bold>Setup assistant <gray>• <white>{arena_name}"
      autosave: "<green>Change saved automatically."
      information: "<aqua>General information"
      display-name: "<yellow>Display name"
      world: "<green>World"
      waiting: "<yellow>Waiting lobby"
      spectator: "<aqua>Spectator point"
      players: "<gold>Player settings"
      teams: "<light_purple>Team settings"
      boundary: "<blue>Map boundary"
      validation: "<red>Validation"
      enable: "<green>Enable {arena_name}?"
      disable: "<yellow>Disable {arena_name}?"
      delete: "<red>Delete"
      conflict: "<red>This arena was changed by another administrator. Refresh the menu."
      failed: "<red>The change could not be saved: {detail}"
      missing: "<red>This arena no longer exists."
      missing-title-v3: "<red><bold>Arena not found <gray>• <white>Menu refreshed"
    position:
      missing: "<red>This position is not configured."
      clear-title: "<red>Reset this position for {arena_id}?"
  input:
    arena-id: "<yellow>Enter the new arena id in chat. Type cancel to abort."
    map-id: "<yellow>Enter the map name for <white>{arena_id}<yellow>. It will be created and linked automatically. Type <white>cancel<yellow> to abort."
    display-name: "<yellow>Enter the new name for {arena_id}. Type cancel to abort."
    number: "<yellow>Enter a positive value for {field}. Type cancel to abort."
    cancel: "<yellow>Input cancelled."
    timeout: "<red>Input timed out."
    invalid: "<red>Invalid value: {problem}. Try again or type cancel."
    already-active: "<red>An input session is already active."
  world:
    title: "<green>World for {arena_name}"
    selected: "<green>Selected world: {world}"
    current: "<aqua>Current world: {world}"
    not-found: "<red>World {world} is not loaded."
    teleport-success: "<green>Teleported to {world}."
  players:
    title: "<gold>Players - {arena_name}"
    assistant-title: "<gold><bold>Step 4 <gray>• <white>Players"
    minimum: "<yellow>Minimum: {minimum_players}"
    maximum: "<yellow>Maximum: {maximum_players}"
    capacity: "<gray>Team capacity: {capacity}"
  teams:
    title: "<light_purple>Teams - {arena_name}"
    assistant-title: "<light_purple><bold>Step 3 <gray>• <white>Teams"
    count: "<yellow>Count: {team_count}"
    players-per-team: "<yellow>Players/team: {players_per_team}"
    format: "<gray>Format: {team_count} x {players_per_team}"
    confirm-title: "<gold>Confirm {new_team_count} x {new_players_per_team}?"
  boundary:
    title: "<blue>Boundary - {arena_name}"
    assistant-title: "<blue><bold>Optional <gray>• <white>Boundaries"
    enabled: "<green>Boundary enabled"
    disabled: "<gray>Boundary disabled"
    minimum: "<yellow>Minimum point"
    maximum: "<yellow>Maximum point"
    invalid: "<red>Invalid boundary"
    reset: "<red>Reset boundary for {arena_id}?"
  validation:
    title: "<gold><bold>To complete <gray>• <white>{arena_name}"
    title-v2: "<gold><bold>To complete <gray>• <white>{arena_name}"
    success: "<green>No blocking problem."
    errors: "<red>Errors: {validation_errors}"
    warnings: "<yellow>Warnings: {validation_warnings}"
    open-section: "<gray>Click to open the related section."
    problems:
      unsupported-version: {message: "The arena file uses an unsupported version.", solution: "Restore a supported version or recreate the arena."}
      blank-name: {message: "The arena does not have a visible name yet.", solution: "Choose a display name."}
      map-template-missing: {message: "No BedWars map is associated.", solution: "Choose a map or create one here."}
      map-template-not-found: {message: "The associated map no longer exists.", solution: "Select another BedWars map."}
      map-template-invalid-type: {message: "The associated map is not a BedWars map.", solution: "Choose a map with the BedWars type."}
      map-template-error: {message: "The associated map contains an error.", solution: "Repair the map or select another one."}
      missing-world: {message: "No world is associated with the arena.", solution: "Choose a BedWars map."}
      unknown-world: {message: "The configured world cannot be found.", solution: "Load the world or choose another map."}
      invalid-minimum: {message: "The minimum player count is invalid.", solution: "Set at least one player."}
      invalid-maximum: {message: "The maximum is lower than the minimum.", solution: "Correct the player limits."}
      invalid-team-count: {message: "At least two teams are required.", solution: "Choose a format with two or more teams."}
      invalid-team-size: {message: "A team must accept at least one player.", solution: "Increase the team size."}
      capacity-mismatch: {message: "The maximum does not match the team format.", solution: "Adjust the format; capacity will be recalculated."}
      missing-waiting: {message: "The waiting point has not been placed.", solution: "Stand at the right location and click to set it."}
      missing-spectator: {message: "The spectator point has not been placed.", solution: "Add it for a better experience."}
      location-world-mismatch: {message: "A position belongs to another map.", solution: "Set this position again inside the associated map."}
      incomplete-boundary: {message: "Boundaries are enabled but incomplete.", solution: "Set both points or disable boundaries."}
      invalid-boundary: {message: "The two boundary points are inconsistent.", solution: "Set the minimum and maximum points again."}
  map:
    title: "<aqua>Map template - {arena_name}"
    assistant-title: "<aqua><bold>Step 1 <gray>• <white>BedWars map"
    created-and-linked: "<green>Map <white>{map_id}<green> was created and linked to the arena."
  delete:
    title: "<red>Delete {arena_name}?"
    warning: "<yellow>A backup will be created."
    confirm-enabled: "<red>This arena is enabled. Confirm a second time."
    success: "<green>Arena {arena_id} was backed up and deleted."
    failed: "<red>Deletion failed."
gui:
  general:
    back: "<yellow>Back"
    close: "<red>Close"
    previous-page: "<yellow>Previous page"
    next-page: "<yellow>Next page"
    refresh: "<aqua>Refresh"
    confirm: "<green>Confirm"
    cancel: "<red>Cancel"
    no-permission: "<red>You cannot use this action."
    disabled: "<red>This action is currently disabled."
    internal-error: "<red>An error occurred while using the menu."
  demo:
    title: "<aqua><bold>HeneriaBedWars <gray>— GUI Test"
    submenu-title: "<light_purple>Demonstration submenu"
    pagination-title: "<green>Demonstration pagination"
    confirm-title: "<gold>Confirm the demonstration action?"
    information:
      name: "<aqua>Information"
      player: "<gray>Player: <white>{player}"
      version: "<gray>Version: <white>{plugin_version}"
      language: "<gray>Language: <white>{language}"
      sessions: "<gray>GUI sessions: <white>{sessions}"
      refresh-count: "<gray>Refreshes: <white>{refresh_count}"
    click-test:
      name: "<yellow>Click test"
      left: "<green>Left click detected."
      right: "<green>Right click detected."
      shift-left: "<green>Shift + left click detected."
      shift-right: "<green>Shift + right click detected."
      middle: "<green>Middle click detected."
    pagination:
      name: "<green>Test pagination"
      element: "<aqua>Test element {element}"
      page: "<gray>Page <white>{page}<gray>/<white>{max_page}"
    confirmation:
      name: "<gold>Test confirmation"
      confirmed: "<green>Demonstration action confirmed."
      cancelled: "<yellow>Demonstration action cancelled."
    submenu:
      name: "<light_purple>Open a submenu"
      info: "<gray>This submenu demonstrates navigation."
    refresh:
      name: "<aqua>Refresh the menu"
    controlled-error:
      name: "<red>Controlled error"
      lore: "<gray>Debug test: the exception will be intercepted."
    close:
      name: "<red>Close"
map:
  command:
    help: "<yellow>Usage: /bedwars map <menu|create|list|info|load|unload|save|teleport|setspawn|duplicate|setdisplayname|delete>"
    player-only: "<red>This operation must be performed by a player."
    created: "<green>Map <white>{map_id}<green> created and loaded."
    success: "<green>Operation completed for <white>{map_id}<green>."
    failed: "<red>Operation failed (<white>{code}<red>): {detail}"
    list: "<gray>Maps (<white>{count}<gray>): <white>{maps}"
    info: "<aqua>{map_name} <gray>(<white>{map_id}<gray>) - {map_type}/{map_state}, world {world_name}, revision {revision}, arenas {arena_count}."
    already-exists: "<red>Map already exists: <white>{map_id}"
    not-found: "<red>Map not found: <white>{map_id}"
    invalid-id: "<red>Invalid map id: {detail}"
    invalid-type: "<red>Invalid map type: <white>{map_type}"
    loaded: "<green>Map <white>{map_id}<green> loaded."
    already-loaded: "<yellow>Map <white>{map_id}<yellow> is already loaded."
    unloaded: "<green>Map <white>{map_id}<green> unloaded."
    already-unloaded: "<yellow>Map <white>{map_id}<yellow> is already unloaded."
    saved: "<green>Map <white>{map_id}<green> saved."
    duplicated: "<green>Map duplicated to <white>{map_id}<green>."
    copy-started: "<yellow>Asynchronously copying <white>{map_id}<yellow> to <white>{destination}<yellow>..."
    updated: "<green>Metadata for <white>{map_id}<green> updated."
    set-spawn: "<green>Construction spawn saved for <white>{map_id}<green>."
    teleported: "<green>Teleported to <white>{map_id}<green>."
    players-present: "<red>Players are still present in <white>{map_id}<red>."
    fallback-world-missing: "<red>The fallback world is missing."
    storage-error: "<red>Storage error: {detail}"
    copy-error: "<red>Copy failed: {detail}"
    backup-error: "<red>Required backup failed: {detail}"
    linked-arena: "<red>Deletion refused: <white>{map_id}<red> is linked to an arena."
    invalid-world: "<red>You must be inside the world of map <white>{map_id}<red>."
  type:
    lobby: "Lobby"
    bedwars: "BedWars"
    generic: "Generic"
  state:
    loaded: "Loaded"
    unloaded: "Unloaded"
    loading: "Loading"
    unloading: "Unloading"
    saving: "Saving"
    error: "Error"
  gui:
    list-title: "<aqua>Map templates ({count})"
    list-title-v2: "<dark_green><bold>My maps <gray>• <white>{count}"
    editor-title: "<gold>Map - {map_name}"
    editor-title-v2: "<gold><bold>Map <gray>• <white>{map_name}"
    create: "<yellow>Enter the new BedWars map name in chat. Type <white>cancel<yellow> to abort."
    create-bedwars: "<yellow>Enter the new BedWars map name in chat. Type <white>cancel<yellow> to abort."
    duplicate: "<yellow>Write the copy id in chat."
    delete: "<red>Delete {map_name}?"
    empty: "<gray>No map template."
    information: "<aqua>Map information"
    load: "<green>Load"
    unload: "<yellow>Unload"
    save: "<aqua>Save"
    teleport: "<light_purple>Teleport"
    set-spawn: "<gold>Set spawn"
    linked-arenas: "<gray>Linked arenas: {linked_arenas}"

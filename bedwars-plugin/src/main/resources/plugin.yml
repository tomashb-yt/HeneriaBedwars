name: HeneriaBedWars
version: '0.1.0-SNAPSHOT'
main: fr.heneria.bedwars.plugin.HeneriaBedWarsPlugin
description: Fondation modulaire du plugin BedWars Heneria.
api-version: '1.21'
authors: [Heneria]
website: https://github.com/tomashb-yt/HeneriaBedwars
commands:
  bedwars:
    description: Commande principale de HeneriaBedWars.
    usage: /bedwars [version|reload|config|language|gui|item|arena|setup]
    aliases:
      - hbw
permissions:
  heneriabedwars.admin:
    description: Permet d'utiliser les commandes administratives de HeneriaBedWars.
    default: op
    children:
      heneriabedwars.admin.reload: true
      heneriabedwars.admin.config: true
      heneriabedwars.admin.language: true
      heneriabedwars.admin.gui: true
      heneriabedwars.admin.item: true
      heneriabedwars.admin.arena: true
      heneriabedwars.admin.setup: true
  heneriabedwars.admin.reload:
    description: Permet de recharger les configurations.
    default: op
  heneriabedwars.admin.config:
    description: Permet de consulter la configuration active.
    default: op
  heneriabedwars.admin.language:
    description: Permet de consulter et modifier la langue globale.
    default: op
  heneriabedwars.admin.gui:
    description: Permet d'ouvrir le menu de test des interfaces.
    default: op
  heneriabedwars.admin.item:
    description: Permet de consulter les items configurables.
    default: op
    children:
      heneriabedwars.admin.item.give: true
      heneriabedwars.admin.item.preview: true
  heneriabedwars.admin.item.give:
    description: Permet de recevoir une copie d'un item configurable.
    default: op
  heneriabedwars.admin.item.preview:
    description: Permet d'ouvrir la prévisualisation des items.
    default: op
  heneriabedwars.admin.arena:
    description: Permet d'administrer les definitions d'arenes.
    default: op
    children:
      heneriabedwars.admin.arena.create: true
      heneriabedwars.admin.arena.list: true
      heneriabedwars.admin.arena.info: true
      heneriabedwars.admin.arena.edit: true
      heneriabedwars.admin.arena.enable: true
      heneriabedwars.admin.arena.disable: true
      heneriabedwars.admin.arena.delete: true
      heneriabedwars.admin.arena.menu: true
      heneriabedwars.admin.arena.teleport: true
  heneriabedwars.admin.arena.create: {description: Creer une arene, default: op}
  heneriabedwars.admin.arena.list: {description: Lister les arenes, default: op}
  heneriabedwars.admin.arena.info: {description: Inspecter une arene, default: op}
  heneriabedwars.admin.arena.edit: {description: Modifier une arene, default: op}
  heneriabedwars.admin.arena.enable: {description: Activer une arene valide, default: op}
  heneriabedwars.admin.arena.disable: {description: Desactiver une arene, default: op}
  heneriabedwars.admin.arena.delete: {description: Supprimer une arene avec confirmation, default: op}
  heneriabedwars.admin.arena.menu: {description: Ouvrir le menu des arenes, default: op}
  heneriabedwars.admin.arena.teleport: {description: Teleporter un administrateur depuis l'editeur, default: op}
  heneriabedwars.admin.setup: {description: Ouvrir la configuration generale en jeu, default: op}

name: HeneriaBedWars
version: '0.1.0-SNAPSHOT'
main: fr.heneria.bedwars.plugin.HeneriaBedWarsPlugin
description: Fondation modulaire du plugin BedWars Heneria.
api-version: '1.21'
authors: [Heneria]
website: https://github.com/tomashb-yt/HeneriaBedwars
commands:
  bedwars:
    description: Commande principale de HeneriaBedWars.
    usage: /bedwars [version|reload|config|language|gui]
    aliases:
      - hbw
permissions:
  heneriabedwars.admin:
    description: Permet d'utiliser les commandes administratives de HeneriaBedWars.
    default: op
    children:
      heneriabedwars.admin.reload: true
      heneriabedwars.admin.config: true
      heneriabedwars.admin.language: true
      heneriabedwars.admin.gui: true
  heneriabedwars.admin.reload:
    description: Permet de recharger les configurations.
    default: op
  heneriabedwars.admin.config:
    description: Permet de consulter la configuration active.
    default: op
  heneriabedwars.admin.language:
    description: Permet de consulter et modifier la langue globale.
    default: op
  heneriabedwars.admin.gui:
    description: Permet d'ouvrir le menu de test des interfaces.
    default: op

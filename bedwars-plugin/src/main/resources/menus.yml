config-version: 1

global:
  default-size: 54
  fill-empty-slots: true
  close-on-critical-error: true
  play-click-sounds: true
navigation:
  history-enabled: true
  max-history-size: 20
interaction:
  default-click-cooldown-ms: 150
  cancel-player-inventory-clicks: true
  cancel-drag-events: true
refresh:
  enabled: true
  minimum-interval-ticks: 10
pagination:
  previous-slot: 45
  next-slot: 53
  back-slot: 49
  page-indicator-slot: 50
sounds:
  enabled: true
  open: {sound: UI_BUTTON_CLICK, volume: 0.5, pitch: 1.2}
  click: {sound: UI_BUTTON_CLICK, volume: 0.4, pitch: 1.0}
  success: {sound: ENTITY_PLAYER_LEVELUP, volume: 0.7, pitch: 1.2}
  error: {sound: ENTITY_VILLAGER_NO, volume: 1.0, pitch: 1.0}
  back: {sound: UI_BUTTON_CLICK, volume: 0.5, pitch: 0.8}
  close: {sound: UI_BUTTON_CLICK, volume: 0.4, pitch: 0.8}
arena-editor:
  list:
    rows: 6
    content-slots: [10, 11, 12, 13, 14, 15, 16, 19, 20, 21, 22, 23, 24, 25, 28, 29, 30, 31, 32, 33, 34]
    create-slot: 49
    filter-slot: 47
    sort-slot: 51
    previous-page-slot: 45
    next-page-slot: 53
  editor:
    rows: 6
    information-slot: 4
    display-name-slot: 10
    world-slot: 12
    waiting-slot: 14
    spectator-slot: 16
    players-slot: 20
    teams-slot: 22
    boundary-slot: 24
    validation-slot: 31
    enable-slot: 39
    delete-slot: 41
    back-slot: 45
    refresh-slot: 49
    close-slot: 53
text-input:
  timeout-seconds: 60
  cancel-keywords: [annuler, cancel]

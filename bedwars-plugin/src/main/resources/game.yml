config-version: 1

game:
  waiting:
    game-mode: ADVENTURE
    protect-players: true
    disable-hunger: true
    disable-item-drop: true
    disable-item-pickup: true
    void-rescue-y: 0
    destroy-empty-instance: true
    empty-destroy-delay-seconds: 30
    items:
      interaction-cooldown-millis: 500

  countdown:
    enabled: true
    normal-seconds: 30
    full-game-seconds: 10
    cancel-below-minimum: true
    allow-join-during-countdown: true
    announcements:
      chat-seconds: [30, 20, 10]
      title-seconds: [5, 4, 3, 2, 1]
    bossbar:
      enabled: true
      color: BLUE
      style: SOLID

  scoreboard:
    enabled: true
    hide-red-numbers: true
    update-interval-ticks: 20
    title: "<aqua><bold>HENERIA BEDWARS</bold></aqua>"
    server-name: "Heneria"
    server-address: "play.heneria.fr"
    waiting:
      lines:
        - ""
        - "<white>Carte <dark_gray>» <aqua>{arena_name}"
        - "<white>Joueurs <dark_gray>» <green>{players}<gray>/{maximum_players}"
        - "<white>Minimum <dark_gray>» <yellow>{minimum_players}"
        - "<white>État <dark_gray>» {state_color}{state}"
        - ""
        - "{status_message}"
        - ""
        - "<aqua>{server_address}"
    starting:
      lines:
        - ""
        - "<white>Carte <dark_gray>» <aqua>{arena_name}"
        - "<white>Joueurs <dark_gray>» <green>{players}<gray>/{maximum_players}"
        - ""
        - "<white>Début dans <dark_gray>» <green>{countdown}s"
        - ""
        - "<yellow>Préparez-vous !"
        - ""
        - "<aqua>{server_address}"
    playing:
      lines:
        - ""
        - "<white>Carte <dark_gray>» <aqua>{arena_name}"
        - "<white>Équipe <dark_gray>» <aqua>{team_name}"
        - "<white>Équipes <dark_gray>» <green>{remaining_teams}"
        - ""
        - "<white>Kills <dark_gray>» <green>{kills}"
        - "<white>Lits <dark_gray>» <aqua>{beds_destroyed}"
        - ""
        - "<aqua>{server_address}"

  inventory:
    leave-slot: 8
    info-slot: 4

  forced-start:
    enabled: true

  beds:
    enabled: true
    own-bed:
      break-protected: true
    destruction:
      broadcast: true
      title-to-victim-team: true
      sound: ENTITY_WITHER_DEATH
      particles: true
      lightning-effect: false

  respawn:
    decision-policy: AT_DEATH
    protection-cancel-on-attack: false

  combat:
    kill-credit-seconds: 10

  reconnect:
    enabled: false
    disconnected-player-elimination-delay-seconds: 0

  ending:
    duration-seconds: 10

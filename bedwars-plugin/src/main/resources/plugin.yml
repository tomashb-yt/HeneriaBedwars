name: HeneriaBedWars
version: '0.1.0-SNAPSHOT'
main: fr.heneria.bedwars.plugin.HeneriaBedWarsPlugin
description: Fondation modulaire du plugin BedWars Heneria.
api-version: '1.21'
authors: [Heneria]
website: https://github.com/tomashb-yt/HeneriaBedwars
commands:
  bedwars:
    description: Commande principale de HeneriaBedWars.
    usage: /bedwars [version|reload|config|language|gui|item|arena|map|game|stats|setup]
    aliases:
      - hbw
      - bw
permissions:
  heneriabedwars.admin:
    description: Permet d'utiliser les commandes administratives de HeneriaBedWars.
    default: op
    children:
      heneriabedwars.admin.dashboard: true
      heneriabedwars.admin.reload: true
      heneriabedwars.admin.config: true
      heneriabedwars.admin.language: true
      heneriabedwars.admin.gui: true
      heneriabedwars.admin.item: true
      heneriabedwars.admin.arena: true
      heneriabedwars.admin.setup: true
      heneriabedwars.admin.map: true
      heneriabedwars.admin.game: true
      heneriabedwars.game.join: true
      heneriabedwars.game.leave: true
      heneriabedwars.statistics.view: true
  heneriabedwars.admin.dashboard:
    description: Ouvrir le tableau de bord administratif.
    default: op
  heneriabedwars.admin.reload:
    description: Permet de recharger les configurations.
    default: op
  heneriabedwars.admin.config:
    description: Permet de consulter la configuration active.
    default: op
  heneriabedwars.admin.language:
    description: Permet de consulter et modifier la langue globale.
    default: op
  heneriabedwars.admin.gui:
    description: Permet d'ouvrir le menu de test des interfaces.
    default: op
  heneriabedwars.admin.item:
    description: Permet de consulter les items configurables.
    default: op
    children:
      heneriabedwars.admin.item.give: true
      heneriabedwars.admin.item.preview: true
  heneriabedwars.admin.item.give:
    description: Permet de recevoir une copie d'un item configurable.
    default: op
  heneriabedwars.admin.item.preview:
    description: Permet d'ouvrir la prévisualisation des items.
    default: op
  heneriabedwars.admin.arena:
    description: Permet d'administrer les definitions d'arenes.
    default: op
    children:
      heneriabedwars.admin.arena.create: true
      heneriabedwars.admin.arena.list: true
      heneriabedwars.admin.arena.info: true
      heneriabedwars.admin.arena.edit: true
      heneriabedwars.admin.arena.enable: true
      heneriabedwars.admin.arena.disable: true
      heneriabedwars.admin.arena.delete: true
      heneriabedwars.admin.arena.menu: true
      heneriabedwars.admin.arena.teleport: true
      heneriabedwars.admin.arena.team.bed: true
  heneriabedwars.admin.arena.create: {description: Creer une arene, default: op}
  heneriabedwars.admin.arena.list: {description: Lister les arenes, default: op}
  heneriabedwars.admin.arena.info: {description: Inspecter une arene, default: op}
  heneriabedwars.admin.arena.edit: {description: Modifier une arene, default: op}
  heneriabedwars.admin.arena.enable: {description: Activer une arene valide, default: op}
  heneriabedwars.admin.arena.disable: {description: Desactiver une arene, default: op}
  heneriabedwars.admin.arena.delete: {description: Supprimer une arene avec confirmation, default: op}
  heneriabedwars.admin.arena.menu: {description: Ouvrir le menu des arenes, default: op}
  heneriabedwars.admin.arena.teleport: {description: Teleporter un administrateur depuis l'editeur, default: op}
  heneriabedwars.admin.arena.team.bed: {description: Configurer les lits complets des equipes, default: op}
  heneriabedwars.admin.setup: {description: Ouvrir la configuration generale en jeu, default: op}
  heneriabedwars.admin.map:
    description: Administrer les cartes modeles.
    default: op
    children:
      heneriabedwars.admin.map.menu: true
      heneriabedwars.admin.map.create: true
      heneriabedwars.admin.map.load: true
      heneriabedwars.admin.map.unload: true
      heneriabedwars.admin.map.save: true
      heneriabedwars.admin.map.teleport: true
      heneriabedwars.admin.map.edit: true
      heneriabedwars.admin.map.duplicate: true
      heneriabedwars.admin.map.delete: true
      heneriabedwars.admin.map.force: true
  heneriabedwars.admin.map.menu: {description: Ouvrir le menu des cartes, default: op}
  heneriabedwars.admin.map.create: {description: Creer une carte modele, default: op}
  heneriabedwars.admin.map.load: {description: Charger une carte modele, default: op}
  heneriabedwars.admin.map.unload: {description: Decharger une carte modele, default: op}
  heneriabedwars.admin.map.save: {description: Sauvegarder une carte modele, default: op}
  heneriabedwars.admin.map.teleport: {description: Se teleporter dans une carte modele, default: op}
  heneriabedwars.admin.map.edit: {description: Modifier une carte modele, default: op}
  heneriabedwars.admin.map.duplicate: {description: Dupliquer une carte modele, default: op}
  heneriabedwars.admin.map.delete: {description: Supprimer une carte modele avec sauvegarde, default: op}
  heneriabedwars.admin.map.force: {description: Forcer un dechargement apres evacuation, default: op}
  heneriabedwars.admin.game:
    description: Administrer les instances temporaires de partie.
    default: op
    children:
      heneriabedwars.admin.game.create: true
      heneriabedwars.admin.game.list: true
      heneriabedwars.admin.game.info: true
      heneriabedwars.game.join: true
      heneriabedwars.game.leave: true
      heneriabedwars.admin.game.start: true
      heneriabedwars.admin.game.force-start: true
      heneriabedwars.admin.game.stop: true
      heneriabedwars.admin.game.destroy: true
      heneriabedwars.admin.game.test: true
  heneriabedwars.admin.game.create: {description: Creer une instance depuis une arene, default: op}
  heneriabedwars.admin.game.list: {description: Lister les instances runtime, default: op}
  heneriabedwars.admin.game.info: {description: Inspecter une instance runtime, default: op}
  heneriabedwars.game.join: {description: Rejoindre une instance runtime publique, default: true}
  heneriabedwars.game.leave: {description: Quitter son instance runtime, default: true}
  heneriabedwars.statistics.view: {description: Consulter ses statistiques BedWars, default: true}
  heneriabedwars.admin.game.start: {description: Demarrer le compte a rebours d'une instance, default: op}
  heneriabedwars.admin.game.force-start: {description: Forcer le passage immediat d'une instance en jeu, default: op}
  heneriabedwars.admin.game.stop: {description: Arreter et nettoyer une instance runtime, default: op}
  heneriabedwars.admin.game.destroy: {description: Detruire et nettoyer une instance runtime, default: op}
  heneriabedwars.admin.game.test: {description: Tester les mecaniques runtime BedWars, default: op}
